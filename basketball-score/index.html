<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="container">

    <div class="team">
        <h1>HOME</h1>
        <h2 id="home-score-el">0</h2>

        <div class="buttons">
            <button onclick="home1()">+1</button>
            <button onclick="home2()">+2</button>
            <button onclick="home3()">+3</button>
        </div>
    </div>

    <div class="team">
        <h1>GUEST</h1>
        <h2 id="guest-score-el">0</h2>

        <div class="buttons">
            <button onclick="away1()">+1</button>
            <button onclick="away2()">+2</button>
            <button onclick="away3()">+3</button>
        </div>
    </div>
    <script src="index.js"></script>
</div>
</body>
</html>
